<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ 暴打仙帝 · 召唤物版</title>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2e 100%); display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; padding: 8px; }
    .game-container { background: #23283e; border-radius: 28px; padding: 16px 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,215,150,0.2); border: 1px solid #5f4a3a; max-width: 100%; width: fit-content; margin: 0 auto; }
    .canvas-area { position: relative; margin-bottom: 8px; }
    #gameCanvas { display: block; width: 100%; height: auto; max-width: 800px; border-radius: 20px; background: radial-gradient(circle at 20% 30%, #3d4a5f, #1a1e2c); box-shadow: inset 0 0 40px #00000055, 0 6px 0 #0f121c; border: 2px solid #a98a6b; cursor: crosshair; touch-action: none; }
    .emperor-bar { display: flex; align-items: center; gap: 12px; color: #f3e3c2; text-shadow: 2px 2px 0 #1f140a; font-weight: bold; padding: 0 6px; }
    .hp-container { flex: 1; height: 24px; background: #2a1e14; border-radius: 30px; border: 1px solid #b89b7a; overflow: hidden; box-shadow: inset 0 3px 6px #00000080; }
    #hpFill { height: 100%; width: 100%; background: linear-gradient(90deg, #dc143c, #ff6a4b, #ffb07c); transition: width 0.1s ease; box-shadow: 0 0 10px #ff5e00; }
    #hpText { min-width: 70px; text-align: right; font-size: 1.1rem; }
    .skill-panel { margin-top: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; white-space: nowrap; padding: 6px 2px 10px; display: flex; gap: 10px; border-top: 1px solid #5e5347; }
    .skill-panel::-webkit-scrollbar { display: none; }
    .skill-btn { flex: 0 0 auto; background: #2f3a4b; border: 2px solid #7a6a5a; color: #f0e1c7; padding: 10px 16px; border-radius: 60px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 0 #151e26; text-shadow: 1px 1px 0 #1a120c; transition: all 0.05s; touch-action: manipulation; cursor: pointer; white-space: nowrap; min-width: 90px; text-align: center; }
    .skill-btn.active { background: #c99c47; border-color: #ffecb3; color: #1f1a0e; box-shadow: 0 2px 0 #7a5e2e; transform: translateY(2px); text-shadow: none; }
    .skill-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #151e26; }
    .action-hint { color: #bbb09b; font-size: 14px; margin: 8px 0 0 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #messageBubble { background: #1e1a14e0; padding: 6px 16px; border-radius: 40px; color: #ffda9e; font-style: italic; border-left: 4px solid gold; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="canvas-area">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
  </div>
  <div class="emperor-bar">
    <span>👑仙帝</span>
    <div class="hp-container"><div id="hpFill"></div></div>
    <span id="hpText">100/100</span>
  </div>
  <div class="skill-panel" id="skillPanel">
    <div class="skill-btn" data-skill="gas">💥煤气罐</div>
    <div class="skill-btn" data-skill="sausage">🌭熏肠</div>
    <div class="skill-btn" data-skill="ghost">👻鬼姥</div>
    <div class="skill-btn" data-skill="nuke">☢️核仙术</div>
    <div class="skill-btn" data-skill="homework">📚暑假作业</div>
    <div class="skill-btn" data-skill="liu">🧑‍🎤刘世鹏</div>
    <div class="skill-btn" data-skill="wang">🥤王老吉</div>
    <div class="skill-btn" data-skill="manual">✋手动攻击</div>
  </div>
  <div class="action-hint">
    <span>👉 选中道具 → 点击场景任意处释放</span>
    <span id="messageBubble">⚡点击仙帝可拖动⚡</span>
  </div>
</div>

    // =====================================================================

    const emperorImg = new Image();
    emperorImg.src = EMPEROR_BASE64;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpFill = document.getElementById('hpFill');
    const hpText = document.getElementById('hpText');
    const msgBubble = document.getElementById('messageBubble');

    // 仙帝状态
    let emperor = {
      x: 400, y: 250, w: 70, h: 70,
      hp: 100, maxHp: 100,
      alive: true,
      hitFlash: 0,
      grayed: false,
      respawnTimer: 0,
    };

    let frame = 0;
    let projectiles = [];
    let effects = [];
    
    // 召唤物数组：{ type, timer, totalDamage, damagePerFrame, x, y }
    let summons = [];

    let manualMode = false;
    let isDragging = false;
    let dragOffsetX = 0, dragOffsetY = 0;
    let currentSkill = 'gas';
    const skillBtns = document.querySelectorAll('.skill-btn');

    // 更新血量UI
    function updateHpBar() {
      const percent = (emperor.hp / emperor.maxHp) * 100;
      hpFill.style.width = Math.max(0, percent) + '%';
      hpText.textContent = `${Math.max(0, emperor.hp)}/${emperor.maxHp}`;
    }

    // 伤害仙帝
    function damageEmperor(amount, sourceX, sourceY) {
      if (!emperor.alive) return;
      emperor.hp = Math.max(0, emperor.hp - amount);
      emperor.hitFlash = 8;
      updateHpBar();
      showFloatingText(`-${Math.floor(amount)}`, emperor.x + emperor.w/2, emperor.y - 10, '#ff8888');

      if (emperor.hp <= 0) {
        emperor.alive = false;
        emperor.grayed = true;
        emperor.respawnTimer = 300; // 5秒后重生
        msgBubble.textContent = '💀仙帝倒下了...💀';
        summons = []; // 清除所有召唤物
      }
    }

    // 漂浮文字
    function showFloatingText(text, x, y, color, size = 20) {
      effects.push({ type:'text', text, x, y, color, life: 50, size });
    }

    // 范围伤害
    function applySplashDamage(centerX, centerY, radius, damage) {
      if (!emperor.alive) return;
      const ex = emperor.x + emperor.w/2;
      const ey = emperor.y + emperor.h/2;
      const dx = ex - centerX, dy = ey - centerY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist <= radius) {
        const falloff = Math.max(0.5, 1 - (dist / radius) * 0.5);
        const finalDmg = Math.floor(damage * falloff);
        damageEmperor(finalDmg, centerX, centerY);
        effects.push({ type:'explosion', x: centerX, y: centerY, radius, life: 15 });
      }
    }

    // 添加投射物
    function addProjectile(type, targetX, targetY) {
      let dmg = 10, splash = false, splashRadius = 0;
      if (type === 'gas') { dmg = 18; splash = true; splashRadius = 70; }
      else if (type === 'sausage') dmg = 8;
      else if (type === 'nuke') { dmg = 40; splash = true; splashRadius = 120; }
      else if (type === 'homework') dmg = 20;
      else if (type === 'wang') dmg = 12;
      
      const fromX = 50 + Math.random() * 700;
      const fromY = 20 + Math.random() * 100;
      
      projectiles.push({
        type, x: fromX, y: fromY, targetX, targetY,
        vx: (targetX - fromX) * 0.09, vy: (targetY - fromY) * 0.09,
        dmg, splash, splashRadius, life: 70, hit: false
      });
    }

    // 处理点击/触摸
    function handleCanvasTap(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;

      if (manualMode) {
        const mx = canvasX, my = canvasY;
        const ex = emperor.x, ey = emperor.y, ew = emperor.w, eh = emperor.h;
        if (mx >= ex && mx <= ex+ew && my >= ey && my <= ey+eh) {
          if (emperor.alive) {
            damageEmperor(5, ex+ew/2, ey);
            showFloatingText('👊', ex+ew/2, ey-20, '#ffaa00', 28);
          }
          isDragging = true;
          dragOffsetX = mx - ex;
          dragOffsetY = my - ey;
        }
        return;
      }

      if (!emperor.alive) return;

      switch (currentSkill) {
        case 'gas': case 'sausage': case 'nuke': case 'homework': case 'wang':
          addProjectile(currentSkill, canvasX, canvasY);
          break;
        case 'ghost':
          // 生成鬼姥召唤物，持续120帧(2秒)，总伤害30
          summons.push({
            type: 'ghost',
            timer: 120,
            totalDamage: 30,
            damagePerFrame: 30 / 120,  // 0.25
            x: emperor.x + 20,
            y: emperor.y - 30
          });
          showFloatingText('👻鬼姥现身!', emperor.x+35, emperor.y-40, '#aa66ff');
          break;
        case 'liu':
          // 生成刘世鹏，持续120帧，总伤害20
          summons.push({
            type: 'liu',
            timer: 120,
            totalDamage: 20,
            damagePerFrame: 20 / 120,  // 0.1667
            x: emperor.x - 10,
            y: emperor.y - 30
          });
          showFloatingText('🧑‍🎤刘世鹏出现!', emperor.x+35, emperor.y-40, '#66ccff');
          break;
        default: break;
      }
    }

    function handleMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      let canvasX = (clientX - rect.left) * scaleX;
      let canvasY = (clientY - rect.top) * scaleY;
      
      emperor.x = Math.min(canvas.width - emperor.w, Math.max(0, canvasX - dragOffsetX));
      emperor.y = Math.min(canvas.height - emperor.h, Math.max(0, canvasY - dragOffsetY));
    }

    function handleEndDrag(e) {
      isDragging = false;
    }

    // 技能切换
    skillBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        skillBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSkill = btn.dataset.skill;
        manualMode = (currentSkill === 'manual');
        msgBubble.textContent = manualMode ? '✋手动: 点击仙帝攻击/拖动' : `👉 选中: ${btn.textContent}`;
      });
    });
    skillBtns[0].classList.add('active');

    canvas.addEventListener('touchstart', handleCanvasTap, {passive: false});
    canvas.addEventListener('mousedown', handleCanvasTap);
    canvas.addEventListener('touchmove', handleMove, {passive: false});
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchend', handleEndDrag);
    canvas.addEventListener('mouseup', handleEndDrag);
    canvas.addEventListener('mouseleave', handleEndDrag);

    // AI移动
    function aiMove() {
      if (!emperor.alive) return;
      if (Math.random() < 0.25) {
        let dx = (Math.random() - 0.5) * 22;
        let dy = (Math.random() - 0.5) * 18;
        emperor.x = Math.min(canvas.width - emperor.w, Math.max(0, emperor.x + dx));
        emperor.y = Math.min(canvas.height - emperor.h, Math.max(0, emperor.y + dy));
      }
    }

    // 更新召唤物 (造成伤害并减少计时)
    function updateSummons() {
      for (let i = summons.length - 1; i >= 0; i--) {
        const s = summons[i];
        if (!emperor.alive) {
          summons.splice(i,1);
          continue;
        }
        // 造成伤害
        damageEmperor(s.damagePerFrame, s.x, s.y);
        s.timer--;
        // 让召唤物跟随仙帝（保持在仙帝周围）
        if (s.type === 'ghost') {
          s.x = emperor.x + 20 + Math.sin(frame * 0.1) * 10;
          s.y = emperor.y - 20 + Math.cos(frame * 0.2) * 8;
        } else {
          s.x = emperor.x - 10 + Math.cos(frame * 0.15) * 12;
          s.y = emperor.y - 25 + Math.sin(frame * 0.1) * 10;
        }
        
        if (s.timer <= 0) {
          summons.splice(i,1);
        }
      }
    }

    // 更新投射物
    function updateProjectiles() {
      for (let i = projectiles.length-1; i>=0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy;
        p.life--;
        
        const distToTarget = Math.hypot(p.targetX - p.x, p.targetY - p.y);
        if (!p.hit && (distToTarget < 15 || p.life <= 0)) {
          p.hit = true;
          if (p.splash) {
            applySplashDamage(p.targetX, p.targetY, p.splashRadius, p.dmg);
          } else {
            const ex = emperor.x, ey = emperor.y, ew = emperor.w, eh = emperor.h;
            if (p.x > ex && p.x < ex+ew && p.y > ey && p.y < ey+eh) {
              damageEmperor(p.dmg, p.x, p.y);
            }
          }
          projectiles.splice(i,1);
          continue;
        }
        
        if (p.x < -50 || p.x > canvas.width+50 || p.y < -50 || p.y > canvas.height+50) {
          projectiles.splice(i,1);
        }
      }
    }

    // 重生逻辑
    function updateRespawn() {
      if (!emperor.alive && emperor.respawnTimer > 0) {
        emperor.respawnTimer--;
        if (emperor.respawnTimer <= 0) {
          emperor.alive = true;
          emperor.grayed = false;
          emperor.hp = emperor.maxHp;
          emperor.x = 200 + Math.random() * 400;
          emperor.y = 100 + Math.random() * 300;
          updateHpBar();
          msgBubble.textContent = '⚡仙帝归来⚡';
          showFloatingText('“本帝不死不灭”', emperor.x + 10, emperor.y - 20, '#FFD966', 22);
        }
      }
    }

    // 渲染
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 背景
      ctx.fillStyle = '#2a3a4a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 仙帝
      if (emperorImg.complete && emperorImg.naturalWidth > 0) {
        ctx.filter = emperor.grayed ? 'grayscale(1)' : (emperor.hitFlash > 0 ? 'brightness(1.5)' : 'none');
        ctx.drawImage(emperorImg, emperor.x, emperor.y, emperor.w, emperor.h);
        ctx.filter = 'none';
      } else {
        ctx.fillStyle = '#a57c50';
        ctx.fillRect(emperor.x, emperor.y, emperor.w, emperor.h);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 16px sans';
        ctx.fillText('仙帝', emperor.x+15, emperor.y+45);
      }
      if (emperor.hitFlash > 0) emperor.hitFlash--;

      // 头顶血条
      const hpPercent = emperor.hp / emperor.maxHp;
      ctx.fillStyle = '#333';
      ctx.fillRect(emperor.x, emperor.y-12, emperor.w, 6);
      ctx.fillStyle = hpPercent > 0.6 ? '#4caf50' : '#ff9800';
      ctx.fillRect(emperor.x, emperor.y-12, emperor.w * hpPercent, 6);

      // 投射物
      projectiles.forEach(p => {
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '18px sans';
        let icon = p.type==='gas'?'💥':p.type==='sausage'?'🌭':p.type==='nuke'?'☢️':p.type==='homework'?'📚':'🥤';
        ctx.fillText(icon, p.x-12, p.y-12);
      });

      // 召唤物绘制
      summons.forEach(s => {
        ctx.font = 'bold 32px sans';
        if (s.type === 'ghost') {
          ctx.fillText('👻', s.x, s.y);
          ctx.font = 'bold 14px sans';
          ctx.fillStyle = '#d4b5ff';
          ctx.fillText('鬼姥', s.x-10, s.y+25);
        } else {
          ctx.fillText('🧑‍🎤', s.x, s.y);
          ctx.font = 'bold 14px sans';
          ctx.fillStyle = '#aad4ff';
          ctx.fillText('刘世鹏', s.x-20, s.y+25);
        }
        // 显示剩余伤害/时间条
        const remainPercent = s.timer / 120;
        ctx.fillStyle = '#333';
        ctx.fillRect(s.x-20, s.y+30, 40, 5);
        ctx.fillStyle = s.type==='ghost' ? '#aa66ff' : '#66ccff';
        ctx.fillRect(s.x-20, s.y+30, 40 * remainPercent, 5);
      });

      // 特效 (爆炸光圈、漂浮文字)
      effects = effects.filter(e => { e.life--; return e.life>0; });
      effects.forEach(e => {
        if (e.type === 'explosion') {
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius * (1 - e.life/20), 0, 2*Math.PI);
          ctx.fillStyle = `rgba(255, 140, 0, ${0.3 * e.life/15})`;
          ctx.fill();
        } else if (e.type === 'text') {
          ctx.fillStyle = e.color;
          ctx.font = `bold ${e.size || 20}px sans`;
          ctx.fillText(e.text, e.x, e.y - (50-e.life)*0.3);
        }
      });
    }

    function gameLoop() {
      if (emperor.alive) {
        frame++;
        if (frame % 6 === 0) aiMove();
        updateSummons();      // 召唤物伤害与更新
      }
      updateProjectiles();
      updateRespawn();
      draw();
      requestAnimationFrame(gameLoop);
    }

    emperorImg.onload = () => {};
    gameLoop();
    updateHpBar();
  })();
</script>
</body>
</html>
